<style>
  :root{
    --bg:#F2F4F7; --surface:#FFFFFF; --surface-alt:#F7F8FA;
    --navy:#22314A; --navy-2:#334765;
    --ink:#1B2130; --ink-soft:#5B6472; --ink-faint:#98A1AD;
    --line:#E4E8EE; --line-strong:#D2D8E0;
    --danger-bg:#FDECEC; --danger-line:#F3B9B9; --danger-ink:#B23A3A;
    --ok:#2E9E6C; --ok-bg:#E7F7EF;
    --radius:14px;
    --shadow:0 1px 2px rgba(20,30,50,.04), 0 8px 24px rgba(20,30,50,.06);
    --font-display:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
    --font-body:'Noto Sans JP',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:64px;}
  header.topbar{background:var(--navy);color:#fff;padding:22px 20px 20px;position:relative;overflow:hidden;}
  .topbar-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;max-width:920px;margin:0 auto;}
  .brand-mark{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:.02em;display:flex;align-items:center;gap:10px;}
  .brand-mark .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,#4C8DFF,#E24B4A);flex:none;}
  .brand-sub{font-size:12.5px;color:rgba(255,255,255,.55);margin-top:4px;letter-spacing:.03em;}
  .topbar-actions{display:flex;gap:8px;align-items:center;}
  .icon-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:#fff;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
  .icon-btn.active{background:#2E9E6C;border-color:#2E9E6C;}
