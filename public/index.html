<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/IMG_1410.png">
<title>TASKLINE ｜ タスク管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F4F7; --surface:#FFFFFF; --surface-alt:#F7F8FA;
    --ink:#1B2130; --ink-soft:#5B6472; --ink-faint:#98A1AD;
    --line:#E4E8EE; --line-strong:#D2D8E0;
    --danger-bg:#FDECEC; --danger-line:#F3B9B9; --danger-ink:#B23A3A;
    --ok:#2E9E6C; --ok-bg:#E7F7EF;
    --accent:#22314A; --accent-strong:#334765; --accent-bg:#E9EBF0;
    --navy:#22314A; --navy-2:#334765;
    --radius:14px;
    --shadow:0 1px 2px rgba(20,30,50,.04), 0 8px 24px rgba(20,30,50,.06);
    --font-display:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
    --font-body:'Noto Sans JP',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:40px;}
  header.topbar{background:var(--navy);border-bottom:0.5px solid var(--navy-2);padding:18px 20px;}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;max-width:920px;margin:0 auto;}
  .brand-mark{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:.02em;color:#fff;}
  .avatar-circle{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-body);}
  .status-line{max-width:920px;margin:6px auto 0;font-size:11.5px;color:rgba(255,255,255,.6);}
  .tab-bar{background:var(--surface);border-bottom:0.5px solid var(--line);display:flex;overflow-x:auto;position:sticky;top:0;z-index:50;}
  .tab-bar-inner{display:flex;max-width:920px;margin:0 auto;width:100%;}
  .tab-btn{background:none;border:none;padding:12px 16px;font-size:13px;font-weight:500;color:var(--ink-faint);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font-body);}
  .tab-btn.active{color:var(--accent-strong);border-bottom-color:var(--accent);}
  main{max-width:920px;margin:0 auto;padding:20px 16px 0;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .bootstrap-banner{background:#FAEEDA;border:1px solid #EF9F27;color:#633806;font-size:12px;padding:10px 14px;border-radius:10px;max-width:920px;margin:12px auto 0;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .bootstrap-banner button{background:#633806;color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font-body);}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .legend{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);}
  .legend-bar{display:flex;height:8px;width:120px;border-radius:4px;overflow:hidden;border:1px solid var(--line-strong);}
  .legend-bar span{flex:1;}
  .btn-primary{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-body);}
  .btn-primary:hover{background:var(--accent-strong);}
  .stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
  .stat-chip{background:var(--surface-alt);border:1px solid var(--line);border-radius:10px;padding:9px 14px;flex:1;min-width:110px;}
  .stat-chip .num{font-family:var(--font-mono);font-size:19px;font-weight:500;line-height:1;color:var(--ink);}
  .stat-chip .lbl{font-size:11.5px;color:var(--ink-faint);margin-top:5px;}
  .stat-chip.overdue{background:var(--danger-bg);border-color:var(--danger-line);}
  .stat-chip.overdue .num{color:var(--danger-ink);}
  section.group{margin-bottom:26px;}
  .group-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-left:2px;}
  .group-head h2{font-family:var(--font-display);font-size:14.5px;font-weight:700;margin:0;color:var(--ink);}
  .group-head .count{font-family:var(--font-mono);font-size:12px;color:var(--ink-faint);background:var(--surface-alt);border:1px solid var(--line);padding:1px 8px;border-radius:20px;}
  .group-head.overdue h2{color:var(--danger-ink);}
  .task-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:8px;display:flex;overflow:hidden;box-shadow:var(--shadow);}
  .task-card.done{opacity:.5;}
  .p-bar{width:6px;flex:none;}
  .task-body{flex:1;padding:13px 16px;min-width:0;}
  .task-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .task-name{font-size:15px;font-weight:500;color:var(--ink);word-break:break-word;}
  .task-name.done{text-decoration:line-through;color:var(--ink-faint);}
  .task-meta{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap;}
  .due-pill{font-family:var(--font-mono);font-size:12px;padding:2px 9px;border-radius:20px;border:1px solid var(--line-strong);color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
  .due-pill.overdue{background:var(--danger-bg);border-color:var(--danger-line);color:var(--danger-ink);}
  .prio-pill{font-family:var(--font-mono);font-size:11px;padding:2px 8px;border-radius:20px;color:#fff;font-weight:500;}
  .task-detail{font-size:12.5px;color:var(--ink-soft);margin-top:7px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .task-actions{display:flex;flex-direction:column;border-left:1px solid var(--line);flex:none;}
  .task-actions button{border:none;background:transparent;width:42px;flex:1;cursor:pointer;color:var(--ink-faint);font-size:16px;display:flex;align-items:center;justify-content:center;}
  .task-actions button:hover{background:var(--surface-alt);color:var(--ink);}
  .task-actions button.complete-btn:hover{color:var(--ok);background:var(--ok-bg);}
  .task-actions button.delete-btn:hover{color:var(--danger-ink);background:var(--danger-bg);}
  .task-actions button + button{border-top:1px solid var(--line);}
  .empty-state{text-align:center;padding:40px 20px;color:var(--ink-faint);font-size:13.5px;background:var(--surface);border:1px dashed var(--line-strong);border-radius:var(--radius);}
  .overlay{position:fixed;inset:0;background:rgba(20,26,38,.5);display:none;align-items:flex-end;justify-content:center;z-index:100;}
  .overlay.show{display:flex;}
  @media (min-width:640px){.overlay{align-items:center;}}
  .modal{background:var(--surface);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:22px 20px 26px;max-height:88vh;overflow-y:auto;}
  @media (min-width:640px){.modal{border-radius:18px;}}
  .modal h3{font-family:var(--font-display);font-size:17px;font-weight:700;margin:0 0 18px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;font-weight:500;}
  .field input[type=text],.field input[type=password],.field textarea,.field input[type=date],.field input[type=time],.field select{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;font-size:14.5px;font-family:var(--font-body);color:var(--ink);background:var(--surface-alt);}
  .field textarea{resize:vertical;min-height:64px;}
  .row-2{display:flex;gap:10px;}
  .row-2 .field{flex:1;}
  .prio-select{display:flex;gap:6px;}
  .prio-opt{flex:1;text-align:center;padding:9px 0;border-radius:10px;cursor:pointer;font-family:var(--font-mono);font-size:13px;font-weight:500;color:#fff;border:2px solid transparent;opacity:.55;}
  .prio-opt.selected{opacity:1;border-color:rgba(0,0,0,.25);}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .btn-secondary{flex:1;background:var(--surface-alt);border:1px solid var(--line-strong);color:var(--ink-soft);padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-body);}
  .btn-save{flex:2;background:var(--accent);border:none;color:#fff;padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-body);}
  .btn-save:hover{background:var(--accent-strong);}
  .fab{position:fixed;right:18px;bottom:18px;z-index:40;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;box-shadow:0 6px 20px rgba(55,138,221,.35);cursor:pointer;}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:300;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .toast.show{opacity:1;}
  .auth-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
  .auth-screen.hide{display:none;}
  .auth-box{background:var(--surface);border-radius:18px;padding:28px 24px;width:100%;max-width:380px;box-shadow:var(--shadow);}
  .auth-box .brand-mark{color:var(--navy);margin-bottom:4px;font-size:20px;}
  .auth-sub{font-size:13px;color:var(--ink-soft);margin:0 0 20px;}
  .auth-error{color:var(--danger-ink);font-size:12.5px;margin:-6px 0 14px;min-height:16px;}
  #app-root{display:none;}
  .remind-badge{font-family:var(--font-mono);font-size:10.5px;background:var(--surface-alt);border:1px solid var(--line-strong);color:var(--ink-soft);padding:1px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
  .created-by{font-size:11px;color:var(--ink-faint);margin-top:4px;}
  .group-selector-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .group-selector-row select{border:1px solid var(--line-strong);border-radius:8px;padding:8px 10px;font-size:13.5px;font-family:var(--font-body);background:var(--surface-alt);color:var(--ink);}
  .checkbox-list{display:flex;flex-wrap:wrap;gap:8px;}
  .checkbox-pill{display:flex;align-items:center;gap:6px;border:1px solid var(--line-strong);border-radius:20px;padding:6px 12px;font-size:12.5px;cursor:pointer;background:var(--surface-alt);}
  .checkbox-pill input{width:auto;margin:0;}
  .checkbox-pill.checked{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-strong);}
  .settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line);gap:10px;}
  .settings-row:last-child{border-bottom:none;}
  .settings-label{font-size:14px;color:var(--ink);font-weight:500;}
  .settings-sub{font-size:12px;color:var(--ink-faint);margin-top:2px;}
  .nudge-btn{width:100%;margin-top:8px;background:none;border:1px solid var(--line-strong);color:var(--ink-soft);padding:7px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font-body);display:flex;align-items:center;justify-content:center;gap:5px;}
  .nudge-btn:hover{background:var(--danger-bg);border-color:var(--danger-line);color:var(--danger-ink);}
  .owner-tag{font-family:var(--font-mono);font-size:10.5px;background:var(--accent-bg);color:var(--accent-strong);padding:1px 8px;border-radius:20px;}
  .review-select-list{max-height:220px;overflow-y:auto;border:1px solid var(--line-strong);border-radius:10px;padding:6px;background:var(--surface-alt);}
  .review-select-row{display:flex;align-items:center;gap:8px;padding:7px 8px;font-size:13.5px;cursor:pointer;border-radius:6px;}
  .review-select-row:hover{background:var(--surface);}
  .review-select-row input{width:auto;margin:0;}
  .nudge-btn{background:none;border:1px solid var(--line-strong);color:var(--ink-soft);}
</style>
</head>
<body>

<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <div class="brand-mark">TASKLINE</div>
    <p class="auth-sub" id="auth-sub">ログインしてください</p>
    <div class="field">
      <label for="auth-username">ユーザーID</label>
      <input type="text" id="auth-username" placeholder="半角英数字 3〜20文字" autocapitalize="none" autocorrect="off">
    </div>
    <div class="field">
      <label for="auth-password">パスワード</label>
      <input type="password" id="auth-password" placeholder="4文字以上">
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-save" id="auth-submit-btn" style="width:100%">ログイン</button>
    <button class="btn-secondary" id="auth-toggle-btn" style="width:100%;margin-top:10px">アカウントを新規作成する</button>
  </div>
</div>

<div id="app-root">
<header class="topbar">
  <div class="topbar-row">
    <div class="brand-mark">TASKLINE</div>
    <button class="avatar-circle" id="avatar-btn" title="設定">A</button>
  </div>
  <div class="status-line" id="status-line">通知を確認中…</div>
</header>

<div id="bootstrap-banner-wrap"></div>

<nav class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab-btn active" data-tab="personal">個人タスク</button>
    <button class="tab-btn" data-tab="group">グループタスク</button>
    <button class="tab-btn" id="tab-btn-review" data-tab="review" style="display:none;">タスク確認</button>
    <button class="tab-btn" data-tab="settings">設定</button>
  </div>
</nav>

<main>

  <div class="tab-panel active" id="tab-personal">
    <div class="stat-row">
      <div class="stat-chip overdue"><div class="num" id="stat-overdue">0</div><div class="lbl">期限切れ</div></div>
      <div class="stat-chip"><div class="num" id="stat-today">0</div><div class="lbl">本日期限</div></div>
      <div class="stat-chip"><div class="num" id="stat-upcoming">0</div><div class="lbl">今後の予定</div></div>
      <div class="stat-chip"><div class="num" id="stat-done">0</div><div class="lbl">完了</div></div>
    </div>
    <div class="toolbar">
      <div class="legend">
        優先度
        <div class="legend-bar">
          <span style="background:#3B82D6"></span><span style="background:#1FA089"></span>
          <span style="background:#E0A426"></span><span style="background:#DB7A2A"></span>
          <span style="background:#D1483F"></span>
        </div>
        低 → 高
      </div>
      <button class="btn-primary" id="open-add-btn">＋ 新規タスク</button>
    </div>
    <div id="task-groups"></div>
  </div>

  <div class="tab-panel" id="tab-group">
    <div id="group-selector-wrap"></div>
    <div class="toolbar">
      <div class="group-head" style="margin:0;"><h2>タスク一覧</h2></div>
      <button class="btn-primary" id="open-group-task-btn">＋ 新規タスク</button>
    </div>
    <div id="group-task-list"></div>
  </div>

  <div class="tab-panel" id="tab-review">
    <div class="field">
      <label>表示する対象者（複数選択可）</label>
      <div class="review-select-list" id="review-people-list"></div>
    </div>
    <button class="btn-primary" id="open-assign-task-btn" style="margin-bottom:20px;">＋ 個別タスクを割り当てる</button>
    <div id="review-task-list"></div>
  </div>

  <div class="tab-panel" id="tab-settings">
    <div class="settings-row">
      <div>
        <div class="settings-label" id="settings-username-label">ログイン中</div>
        <div class="settings-sub" id="settings-role-label"></div>
      </div>
    </div>
    <div class="settings-row">
      <div>
        <div class="settings-label">通知</div>
        <div class="settings-sub" id="settings-notif-status">確認中…</div>
      </div>
      <button class="btn-secondary" id="settings-notif-btn" style="flex:none;padding:8px 14px;">有効にする</button>
    </div>
    <div class="settings-row" id="settings-admin-row" style="display:none;">
      <div class="settings-label">管理画面</div>
      <a class="btn-secondary" href="/admin.html" style="flex:none;padding:8px 14px;text-decoration:none;">開く</a>
    </div>
    <div class="settings-row">
      <div class="settings-label">ログアウト</div>
      <button class="btn-secondary" id="settings-logout-btn" style="flex:none;padding:8px 14px;">ログアウト</button>
    </div>
  </div>

</main>

<button class="fab" id="fab-add-btn" title="新規タスク">＋</button>

<div class="overlay" id="task-overlay">
  <div class="modal">
    <h3 id="modal-title">新規タスク</h3>
    <form id="task-form">
      <div class="field"><label for="f-name">タスク名</label><input type="text" id="f-name" placeholder="例：見積書を送付する" required></div>
      <div class="field"><label for="f-detail">詳細</label><textarea id="f-detail" placeholder="タスクの詳細を入力"></textarea></div>
      <div class="row-2">
        <div class="field"><label for="f-date">期日</label><input type="date" id="f-date" required></div>
        <div class="field"><label for="f-time">時間</label><input type="time" id="f-time" required></div>
      </div>
      <div class="field">
        <label>優先順位</label>
        <div class="prio-select" id="prio-select">
          <div class="prio-opt" data-p="1" style="background:#3B82D6">1</div>
          <div class="prio-opt" data-p="2" style="background:#1FA089">2</div>
          <div class="prio-opt selected" data-p="3" style="background:#E0A426">3</div>
          <div class="prio-opt" data-p="4" style="background:#DB7A2A">4</div>
          <div class="prio-opt" data-p="5" style="background:#D1483F">5</div>
        </div>
      </div>
      <div class="field">
        <label for="f-remind">事前通知</label>
        <select id="f-remind">
          <option value="">なし</option>
          <option value="5">5分前</option>
          <option value="30">30分前</option>
          <option value="60">1時間前</option>
          <option value="1440">1日前</option>
        </select>
      </div>
      <div class="field">
        <label for="f-repeat-freq">繰り返し</label>
        <select id="f-repeat-freq">
          <option value="">なし</option>
          <option value="daily">毎日</option>
          <option value="weekly">毎週</option>
          <option value="monthly-date">毎月（日付指定）</option>
          <option value="monthly-weekday">毎月（第◯曜日）</option>
        </select>
      </div>
      <div class="field" id="f-repeat-weekly-field" style="display:none;">
        <label>曜日（複数選択可）</label>
        <div class="checkbox-list" id="f-repeat-weekly-days">
          <label class="checkbox-pill"><input type="checkbox" value="0">日</label>
          <label class="checkbox-pill"><input type="checkbox" value="1">月</label>
          <label class="checkbox-pill"><input type="checkbox" value="2">火</label>
          <label class="checkbox-pill"><input type="checkbox" value="3">水</label>
          <label class="checkbox-pill"><input type="checkbox" value="4">木</label>
          <label class="checkbox-pill"><input type="checkbox" value="5">金</label>
          <label class="checkbox-pill"><input type="checkbox" value="6">土</label>
        </div>
      </div>
      <div class="field" id="f-repeat-monthly-date-field" style="display:none;">
        <label for="f-repeat-day-of-month">日付</label>
        <input type="number" id="f-repeat-day-of-month" min="1" max="31" value="1">
      </div>
      <div class="field" id="f-repeat-monthly-weekday-field" style="display:none;">
        <label>第何週・曜日</label>
        <div class="row-2">
          <select id="f-repeat-week-of-month">
            <option value="1">第1</option>
            <option value="2">第2</option>
            <option value="3">第3</option>
            <option value="4">第4</option>
            <option value="-1">最終</option>
          </select>
          <select id="f-repeat-weekday">
            <option value="0">日曜日</option>
            <option value="1">月曜日</option>
            <option value="2">火曜日</option>
            <option value="3">水曜日</option>
            <option value="4">木曜日</option>
            <option value="5">金曜日</option>
            <option value="6">土曜日</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="cancel-btn">キャンセル</button>
        <button type="submit" class="btn-save">保存する</button>
      </div>
    </form>
  </div>
</div>

<div class="overlay" id="group-task-overlay">
  <div class="modal">
    <h3>グループタスクを追加</h3>
    <form id="group-task-form">
      <div class="field"><label for="gt-name">タスク名</label><input type="text" id="gt-name" placeholder="例：週次報告の提出" required></div>

<script>
let tasks = [];
let editingId = null;
let selectedPriority = 3;
let authMode = 'login';
let authToken = localStorage.getItem('taskline_token');
let authUsername = localStorage.getItem('taskline_user');

function priorityColor(p){ return {1:'#3B82D6',2:'#1FA089',3:'#E0A426',4:'#DB7A2A',5:'#D1483F'}[p] || '#E0A426'; }
function priorityLabel(p){ return {1:'低',2:'やや低',3:'普通',4:'やや高',5:'高'}[p] || '普通'; }
function remindLabelJs(minutes){
  if(minutes >= 1440) return `${Math.round(minutes/1440)}日前`;
  if(minutes >= 60) return `${Math.round(minutes/60)}時間前`;
  return `${minutes}分前`;
}

function sortWithCompletedLast(list){
  return [...list].sort((a,b)=>{
    if(a.completed !== b.completed) return a.completed ? 1 : -1;
    return new Date(a.dueAt) - new Date(b.dueAt);
  });
}

const WEEKDAY_LABELS = ['日','月','火','水','木','金','土'];
function recurrenceLabelJs(r){
  if(!r || !r.freq) return '';
  if(r.freq === 'daily') return '毎日';
  if(r.freq === 'weekly'){
    const days = (r.daysOfWeek||[]).map(d => WEEKDAY_LABELS[d]).join('・');
    return `毎週${days}`;
  }
  if(r.freq === 'monthly-date') return `毎月${r.dayOfMonth}日`;
  if(r.freq === 'monthly-weekday'){
    const week = r.weekOfMonth === -1 ? '最終' : `第${r.weekOfMonth}`;
    return `毎月${week}${WEEKDAY_LABELS[r.weekday]}曜`;
  }
  return '';
}

function setupRecurrenceUI(prefix){
  const freqSel = document.getElementById(`${prefix}-repeat-freq`);
  const weeklyField = document.getElementById(`${prefix}-repeat-weekly-field`);
  const monthlyDateField = document.getElementById(`${prefix}-repeat-monthly-date-field`);
  const monthlyWeekdayField = document.getElementById(`${prefix}-repeat-monthly-weekday-field`);
  freqSel.addEventListener('change', ()=>{
    const v = freqSel.value;
    weeklyField.style.display = v === 'weekly' ? 'block' : 'none';
    monthlyDateField.style.display = v === 'monthly-date' ? 'block' : 'none';
    monthlyWeekdayField.style.display = v === 'monthly-weekday' ? 'block' : 'none';
  });
}
function resetRecurrenceUI(prefix){
  document.getElementById(`${prefix}-repeat-freq`).value = '';
  document.querySelectorAll(`#${prefix}-repeat-weekly-days input`).forEach(i => { i.checked = false; i.closest('.checkbox-pill').classList.remove('checked'); });
  document.getElementById(`${prefix}-repeat-day-of-month`).value = 1;
  document.getElementById(`${prefix}-repeat-week-of-month`).value = '1';
  document.getElementById(`${prefix}-repeat-weekday`).value = '0';
  document.getElementById(`${prefix}-repeat-weekly-field`).style.display = 'none';
  document.getElementById(`${prefix}-repeat-monthly-date-field`).style.display = 'none';
  document.getElementById(`${prefix}-repeat-monthly-weekday-field`).style.display = 'none';
}
function applyRecurrenceUI(prefix, r){
  resetRecurrenceUI(prefix);
  if(!r || !r.freq) return;
  document.getElementById(`${prefix}-repeat-freq`).value = r.freq;
  if(r.freq === 'weekly'){
    document.getElementById(`${prefix}-repeat-weekly-field`).style.display = 'block';
    (r.daysOfWeek||[]).forEach(d => {
      const input = document.querySelector(`#${prefix}-repeat-weekly-days input[value="${d}"]`);
      if(input){ input.checked = true; input.closest('.checkbox-pill').classList.add('checked'); }
    });
  } else if(r.freq === 'monthly-date'){
    document.getElementById(`${prefix}-repeat-monthly-date-field`).style.display = 'block';
    document.getElementById(`${prefix}-repeat-day-of-month`).value = r.dayOfMonth || 1;
  } else if(r.freq === 'monthly-weekday'){
    document.getElementById(`${prefix}-repeat-monthly-weekday-field`).style.display = 'block';
    document.getElementById(`${prefix}-repeat-week-of-month`).value = String(r.weekOfMonth || 1);
    document.getElementById(`${prefix}-repeat-weekday`).value = String(r.weekday || 0);
  }
}
function readRecurrenceUI(prefix){
  const freq = document.getElementById(`${prefix}-repeat-freq`).value;
  if(!freq) return null;
  if(freq === 'daily') return { freq: 'daily' };
  if(freq === 'weekly'){
    const days = Array.from(document.querySelectorAll(`#${prefix}-repeat-weekly-days input:checked`)).map(i => Number(i.value));
    return { freq: 'weekly', daysOfWeek: days };
  }
  if(freq === 'monthly-date'){
    const day = Number(document.getElementById(`${prefix}-repeat-day-of-month`).value) || 1;
    return { freq: 'monthly-date', dayOfMonth: Math.min(Math.max(day,1),31) };
  }
  if(freq === 'monthly-weekday'){
    const week = Number(document.getElementById(`${prefix}-repeat-week-of-month`).value);
    const weekday = Number(document.getElementById(`${prefix}-repeat-weekday`).value);
    return { freq: 'monthly-weekday', weekOfMonth: week, weekday };
  }
  return null;
}
document.querySelectorAll('.checkbox-list .checkbox-pill input[type=checkbox]').forEach(input => {
  input.addEventListener('change', ()=> input.closest('.checkbox-pill').classList.toggle('checked', input.checked));
});
setupRecurrenceUI('f');
setupRecurrenceUI('gt');

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}
function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
function fmtDue(iso){
  const d = new Date(iso);
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const sameYear = d.getFullYear() === now.getFullYear();
  const datePart = sameYear ? `${pad(d.getMonth()+1)}/${pad(d.getDate())}` : `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
  return `${datePart} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* ---------- Auth ---------- */
function authHeaders(){
  return authToken ? { 'Authorization': 'Bearer ' + authToken } : {};
}
function showAuthScreen(){
  document.getElementById('auth-screen').classList.remove('hide');
  document.getElementById('app-root').style.display = 'none';
}
function hideAuthScreen(){
  document.getElementById('auth-screen').classList.add('hide');
  document.getElementById('app-root').style.display = 'block';
}
function logout(){
  localStorage.removeItem('taskline_token');
  localStorage.removeItem('taskline_user');
  authToken = null;
  authUsername = null;
  showAuthScreen();
}
document.getElementById('settings-logout-btn').addEventListener('click', logout);

document.getElementById('auth-toggle-btn').addEventListener('click', ()=>{
  authMode = authMode === 'login' ? 'signup' : 'login';
  document.getElementById('auth-sub').textContent = authMode === 'login' ? 'ログインしてください' : '新しいアカウントを作成してください';
  document.getElementById('auth-submit-btn').textContent = authMode === 'login' ? 'ログイン' : 'アカウントを作成';
  document.getElementById('auth-toggle-btn').textContent = authMode === 'login' ? 'アカウントを新規作成する' : 'ログイン画面に戻る';
  document.getElementById('auth-error').textContent = '';
});

document.getElementById('auth-submit-btn').addEventListener('click', async ()=>{
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  if(!username || !password){ errEl.textContent = 'ユーザーIDとパスワードを入力してください'; return; }
  try{
    const res = await fetch('/api/auth', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action: authMode, username, password })
    });
    const data = await res.json();
    if(!res.ok){ errEl.textContent = data.error || 'エラーが発生しました'; return; }
    authToken = data.token;
    authUsername = data.username;
    localStorage.setItem('taskline_token', authToken);
    localStorage.setItem('taskline_user', authUsername);
    hideAuthScreen();
    startApp();
  }catch(err){ errEl.textContent = '通信エラーが発生しました'; }
});

/* ---------- Tab switching ---------- */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', ()=>{
    if(btn.style.display === 'none') return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('fab-add-btn').style.display = tab === 'personal' ? 'flex' : 'none';
    if(tab === 'group') loadGroupTab();
    if(tab === 'review') loadReviewTab();
  });
});
document.getElementById('avatar-btn').addEventListener('click', ()=>{
  document.querySelector('.tab-btn[data-tab="settings"]').click();
});

/* ---------- Personal task API ---------- */
async function apiGetTasks(){
  const res = await fetch('/api/tasks', { headers: authHeaders() });
  if(res.status === 401){ logout(); throw new Error('ログインが必要です'); }
  if(!res.ok) throw new Error('取得に失敗しました');
  return res.json();
}
async function apiCreateTask(payload){
  const res = await fetch('/api/tasks', { method:'POST', headers:{'Content-Type':'application/json', ...authHeaders()}, body: JSON.stringify(payload) });
  if(res.status === 401){ logout(); throw new Error('ログインが必要です'); }
  if(!res.ok) throw new Error('作成に失敗しました');
  return res.json();
}
async function apiUpdateTask(payload){
  const res = await fetch('/api/tasks', { method:'PATCH', headers:{'Content-Type':'application/json', ...authHeaders()}, body: JSON.stringify(payload) });
  if(res.status === 401){ logout(); throw new Error('ログインが必要です'); }
  if(!res.ok) throw new Error('更新に失敗しました');
  return res.json();
}
async function apiDeleteTask(id){
  const res = await fetch(`/api/tasks?id=${encodeURIComponent(id)}`, { method:'DELETE', headers: authHeaders() });
  if(res.status === 401){ logout(); throw new Error('ログインが必要です'); }
  if(!res.ok) throw new Error('削除に失敗しました');
  return res.json();
}

async function refreshTasks(){
  try{
    tasks = await apiGetTasks();
    render();
  }catch(e){
    const el = document.getElementById('status-line');
    if(el) el.textContent = 'サーバーに接続できません。しばらくしてから再度お試しください。';
  }
}

/* ---------- Personal task rendering ---------- */
function groupTasks(){
  const now = new Date();
  const todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23,59,59);
  const active = tasks.filter(t => !t.completed);
  const done = tasks.filter(t => t.completed);
  const overdue = active.filter(t => new Date(t.dueAt) < now).sort((a,b)=> new Date(a.dueAt)-new Date(b.dueAt));
  const today = active.filter(t => new Date(t.dueAt) >= now && new Date(t.dueAt) <= todayEnd).sort((a,b)=> new Date(a.dueAt)-new Date(b.dueAt));
  const upcoming = active.filter(t => new Date(t.dueAt) > todayEnd).sort((a,b)=> new Date(a.dueAt)-new Date(b.dueAt));
  const doneSorted = done.sort((a,b)=> new Date(b.dueAt)-new Date(a.dueAt));
  return { overdue, today, upcoming, done: doneSorted };
}

function taskCardHTML(t, isOverdue){
  const color = priorityColor(t.priority);
  return `
  <div class="task-card ${t.completed?'done':''}" data-id="${t.id}">
    <div class="p-bar" style="background:${color}"></div>
    <div class="task-body">
      <div class="task-top">
        <div class="task-name ${t.completed?'done':''}">${escapeHTML(t.name)}</div>
        <div class="prio-pill" style="background:${color}">P${t.priority} ${priorityLabel(t.priority)}</div>
      </div>
      <div class="task-meta"><div class="due-pill ${isOverdue?'overdue':''}">🕒 ${fmtDue(t.dueAt)}</div>${t.remindBefore ? `<span class="remind-badge">⏰ ${remindLabelJs(t.remindBefore)}</span>` : ''}${t.recurrence ? `<span class="remind-badge">🔁 ${recurrenceLabelJs(t.recurrence)}</span>` : ''}</div>
      ${t.detail ? `<div class="task-detail">${escapeHTML(t.detail)}</div>` : ''}
      ${t.assignedBy ? `<div class="created-by">📌 ${escapeHTML(t.assignedBy)}さんから割り当て</div>` : ''}
    </div>
    <div class="task-actions">
      <button class="complete-btn" data-action="complete" title="${t.completed?'未完了に戻す':'完了にする'}">${t.completed?'↺':'✓'}</button>
      <button data-action="edit" title="編集">✎</button>
      <button class="delete-btn" data-action="delete" title="削除">🗑</button>
    </div>
  </div>`;
}

function render(){
  const { overdue, today, upcoming, done } = groupTasks();
  const container = document.getElementById('task-groups');
  document.getElementById('stat-overdue').textContent = overdue.length;
  document.getElementById('stat-today').textContent = today.length;
  document.getElementById('stat-upcoming').textContent = upcoming.length;
  document.getElementById('stat-done').textContent = done.length;

  if(tasks.length === 0){
    container.innerHTML = `<div class="empty-state">タスクはまだありません。右下の「＋」から新規タスクを追加してください。</div>`;
    return;
  }
  let html = '';
  if(overdue.length){ html += `<section class="group"><div class="group-head overdue"><h2>期限切れ</h2><span class="count">${overdue.length}</span></div>${overdue.map(t=>taskCardHTML(t,true)).join('')}</section>`; }
  if(today.length){ html += `<section class="group"><div class="group-head"><h2>本日期限</h2><span class="count">${today.length}</span></div>${today.map(t=>taskCardHTML(t,false)).join('')}</section>`; }
  if(upcoming.length){ html += `<section class="group"><div class="group-head"><h2>今後の予定</h2><span class="count">${upcoming.length}</span></div>${upcoming.map(t=>taskCardHTML(t,false)).join('')}</section>`; }
  if(done.length){ html += `<section class="group"><div class="group-head"><h2>完了済み</h2><span class="count">${done.length}</span></div>${done.map(t=>taskCardHTML(t,false)).join('')}</section>`; }
  container.innerHTML = html || `<div class="empty-state">タスクはまだありません。右下の「＋」から新規タスクを追加してください。</div>`;
}

/* ---------- Personal task modal ---------- */
const overlay = document.getElementById('task-overlay');
const form = document.getElementById('task-form');

function openModal(task){
  editingId = task ? task.id : null;
  document.getElementById('modal-title').textContent = task ? 'タスクを編集' : '新規タスク';
  document.getElementById('f-name').value = task ? task.name : '';
  document.getElementById('f-detail').value = task ? task.detail : '';
  document.getElementById('f-remind').value = task && task.remindBefore ? String(task.remindBefore) : '';
  applyRecurrenceUI('f', task ? task.recurrence : null);
  const pad = n => String(n).padStart(2,'0');
  if(task){
    const d = new Date(task.dueAt);
    document.getElementById('f-date').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    document.getElementById('f-time').value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    selectedPriority = task.priority;
  } else {
    const now = new Date(); now.setMinutes(now.getMinutes()+30);
    document.getElementById('f-date').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    document.getElementById('f-time').value = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    selectedPriority = 3;
  }
  updatePrioUI();
  overlay.classList.add('show');
  document.getElementById('f-name').focus();
}
function closeModal(){ overlay.classList.remove('show'); form.reset(); editingId = null; }
function updatePrioUI(){
  document.querySelectorAll('#prio-select .prio-opt').forEach(el => el.classList.toggle('selected', Number(el.dataset.p) === selectedPriority));
}
document.getElementById('prio-select').addEventListener('click', e=>{
  const opt = e.target.closest('.prio-opt'); if(!opt) return;
  selectedPriority = Number(opt.dataset.p); updatePrioUI();
});
document.getElementById('open-add-btn').addEventListener('click', ()=> openModal(null));
document.getElementById('fab-add-btn').addEventListener('click', ()=> openModal(null));
document.getElementById('cancel-btn').addEventListener('click', closeModal);
overlay.addEventListener('click', e=>{ if(e.target === overlay) closeModal(); });

form.addEventListener('submit', async e=>{
  e.preventDefault();
  const name = document.getElementById('f-name').value.trim();
  const detail = document.getElementById('f-detail').value.trim();
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  const remindBefore = document.getElementById('f-remind').value || null;
  const recurrence = readRecurrenceUI('f');
  if(!name || !date || !time) return;

/* ---------- Push notifications ---------- */
function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

let swRegistration = null;
let pushActive = false;

async function initPush(){
  const statusLine = document.getElementById('status-line');
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    statusLine.textContent = 'このブラウザはプッシュ通知に対応していません。';
    return;
  }
  swRegistration = await navigator.serviceWorker.register('/service-worker.js');
  const existing = await swRegistration.pushManager.getSubscription();
  if(existing && Notification.permission === 'granted'){
    pushActive = true;
    statusLine.textContent = `ようこそ、${authUsername}さん。通知は有効です。`;
    try{
      await fetch('/api/subscribe', { method:'POST', headers:{'Content-Type':'application/json', ...authHeaders()}, body: JSON.stringify(existing) });
    }catch(e){}
  } else {
    statusLine.textContent = `ようこそ、${authUsername}さん。通知は未設定です。`;
  }
  updateSettingsNotifUI();
}

async function subscribePush(){
  if(Notification.permission === 'denied'){
    showToast('ブラウザの設定で通知がブロックされています');
    return;
  }
  const perm = await Notification.requestPermission();
  if(perm !== 'granted'){ showToast('通知が許可されませんでした'); return; }

  const keyRes = await fetch('/api/vapid-public-key');
  const { publicKey } = await keyRes.json();
  if(!publicKey){ showToast('サーバー側の設定が未完了です（VAPID公開鍵）'); return; }

  const sub = await swRegistration.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(publicKey)
  });
  await fetch('/api/subscribe', { method:'POST', headers:{'Content-Type':'application/json', ...authHeaders()}, body: JSON.stringify(sub) });
  pushActive = true;
  document.getElementById('status-line').textContent = `ようこそ、${authUsername}さん。通知は有効です。`;
  showToast('通知を有効にしました');
  updateSettingsNotifUI();
}

function updateSettingsNotifUI(){
  const btn = document.getElementById('settings-notif-btn');
  const statusEl = document.getElementById('settings-notif-status');
  if(pushActive){
    statusEl.textContent = '有効';
    btn.textContent = '有効です';
  } else {
    statusEl.textContent = '未設定';
    btn.textContent = '有効にする';
  }
}
document.getElementById('settings-notif-btn').addEventListener('click', async ()=>{
  if(pushActive){ showToast('通知は有効です'); return; }
  try{ await subscribePush(); }
  catch(err){ showToast('通知の設定に失敗しました：' + err.message); }
});

function renderMeUI(){
  if(!meInfo) return;

  const bannerWrap = document.getElementById('bootstrap-banner-wrap');
  if(!meInfo.hasAnyAdmin){
    bannerWrap.innerHTML = `<div class="bootstrap-banner">
      <span>このアプリにはまだ管理者がいません。最初のユーザーとして管理者になりますか？</span>

function renderGroupTaskList(){
  const container = document.getElementById('group-task-list');

    container.innerHTML = `<div class="empty-state">グループタスクはまだありません。</div>`;
    return;
  }
  const sorted = sortWithCompletedLast(currentGroupTasks);
  container.innerHTML = sorted.map(groupTaskCardHTML).join('');

  const btn = e.target.closest('button[data-gaction]'); if(!btn) return;

let reviewSelectedPeople = [];

async function loadReviewTab(){

      const input = label.querySelector('input');

        loadReviewTasks();
      });
      listEl.appendChild(label);
    });
  }catch(e){}
  await loadReviewTasks();

async function loadReviewTasks(){
  const container = document.getElementById('review-task-list');
  if(reviewSelectedPeople.length === 0){
    container.innerHTML = `<div class="empty-state">対象者を選択してください。</div>`;
    return;
  }
  container.innerHTML = `<div class="empty-state">読み込み中…</div>`;
  try{
    const results = await Promise.all(reviewSelectedPeople.map(async name => {
      const res = await fetch(`/api/people?type=member-tasks&username=${encodeURIComponent(name)}`, { headers: authHeaders() });
      if(!res.ok) return [];
      const data = await res.json();
      return data.tasks.map(t => ({ ...t, ownerUsername: name }));
    }));
    const merged = sortWithCompletedLast(results.flat());
    if(merged.length === 0){
      container.innerHTML = `<div class="empty-state">タスクはありません。</div>`;
      return;
    }
    container.innerHTML = merged.map(reviewTaskCardHTML).join('');
  }catch(e){ container.innerHTML = `<div class="empty-state">通信エラーが発生しました。</div>`; }
}

function reviewTaskCardHTML(t){
  const color = priorityColor(t.priority);
  const isOverdue = new Date(t.dueAt) < new Date();

    <div class="task-body" style="padding-bottom:12px;">

        <div class="task-name ${t.completed?'done':''}">${escapeHTML(t.name)}</div>

      ${t.detail ? `<div class="task-detail">${escapeHTML(t.detail)}</div>` : ''}
      ${!t.completed ? `<button class="nudge-btn" data-nudge="1">📣 催促する</button>` : ''}

}
